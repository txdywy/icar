<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iCar - 智能汽车查询</title>
  <meta name="description" content="搜索任意车型，获取实时价格、配置、落地价数据" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a href="/" class="logo" aria-label="iCar Home">
          <span class="logo-icon">🚗</span>
          <span class="logo-text">iCar</span>
        </a>
        <nav class="nav-links">
          <button class="nav-btn" data-tab="search" aria-current="page">搜索</button>
          <button class="nav-btn" data-tab="hot">热门</button>
        </nav>
        <div class="header-actions">
          <span class="api-status" id="apiStatus" title="API 状态">
            <span class="status-dot"></span>
          </span>
        </div>
      </div>
    </header>

    <!-- Hero / Search -->
    <section class="hero" id="heroSection">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="hero-title-line">搜索任意车型</span>
          <span class="hero-title-sub">实时价格 · 配置对比 · 落地价计算</span>
        </h1>
        <div class="search-box" id="searchBox">
          <div class="search-input-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="输入车型名称，如：Model Y、秦PLUS、问界M7..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="search-clear" id="searchClear" aria-label="清空" style="display:none;">✕</button>
            <button class="search-btn" id="searchBtn">
              <span class="search-btn-text">搜索</span>
              <span class="search-btn-loading" style="display:none;">
                <span class="spinner"></span>
              </span>
            </button>
          </div>
          <!-- suggestions dropdown -->
          <div class="suggestions" id="suggestions" style="display:none;"></div>
        </div>
        <!-- quick tags -->
        <div class="quick-tags" id="quickTags">
          <span class="quick-tag" data-q="特斯拉 Model Y">Model Y</span>
          <span class="quick-tag" data-q="比亚迪 秦PLUS">秦PLUS</span>
          <span class="quick-tag" data-q="问界 M7">问界M7</span>
          <span class="quick-tag" data-q="小米 SU7">小米SU7</span>
          <span class="quick-tag" data-q="理想 L6">理想L6</span>
          <span class="quick-tag" data-q="蔚来 ET5">蔚来ET5</span>
        </div>
      </div>
    </section>

    <!-- Results Area -->
    <main class="main" id="mainContent" style="display:none;">
      <!-- Breadcrumb -->
      <div class="breadcrumb" id="breadcrumb" style="display:none;">
        <button class="breadcrumb-link" id="breadcrumbHome">首页</button>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="breadcrumbCurrent"></span>
      </div>

      <!-- Search Results -->
      <section class="results-section" id="resultsSection" style="display:none;">
        <div class="section-header">
          <h2 class="section-title" id="resultsTitle">搜索结果</h2>
          <span class="results-count" id="resultsCount"></span>
        </div>
        <div class="car-grid" id="carGrid"></div>
      </section>

      <!-- Series Detail -->
      <section class="detail-section" id="detailSection" style="display:none;">
        <div class="detail-hero" id="detailHero">
          <div class="detail-cover-wrap">
            <img id="detailCover" class="detail-cover" alt="" loading="lazy" />
          </div>
          <div class="detail-info">
            <h1 class="detail-title" id="detailTitle"></h1>
            <p class="detail-subtitle" id="detailSubtitle"></p>
            <div class="detail-price-row">
              <div class="detail-price-block">
                <span class="price-label">厂商指导价</span>
                <span class="price-value" id="detailGuidePrice"></span>
              </div>
              <div class="detail-price-block highlight">
                <span class="price-label">经销商参考价</span>
                <span class="price-value" id="detailDealerPrice"></span>
              </div>
              <div class="detail-price-block onroad">
                <span class="price-label">预估落地价</span>
                <span class="price-value" id="detailOnRoadPrice"></span>
                <span class="price-note">*仅供参考</span>
              </div>
            </div>
            <div class="detail-tags" id="detailTags"></div>
          </div>
        </div>

        <!-- Price Breakdown -->
        <div class="price-breakdown" id="priceBreakdown" style="display:none;">
          <h3 class="subsection-title">💰 落地价明细</h3>
          <div class="breakdown-grid" id="breakdownGrid"></div>
        </div>

        <!-- Config Table -->
        <div class="config-section">
          <h3 class="subsection-title">📋 车型配置</h3>
          <div class="config-loading" id="configLoading">
            <span class="spinner"></span> 加载配置数据...
          </div>
          <div class="config-table-wrap" id="configTableWrap" style="display:none;">
            <table class="config-table" id="configTable">
              <thead id="configThead"></thead>
              <tbody id="configTbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- Hot Section -->
    <section class="hot-section" id="hotSection" style="display:none;">
      <h2 class="section-title">🔥 热门车型</h2>
      <div class="hot-grid" id="hotGrid"></div>
    </section>

    <!-- Error / Empty States -->
    <div class="state-overlay" id="stateOverlay" style="display:none;">
      <div class="state-content" id="stateContent"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>iCar — 智能汽车数据查询平台 | 数据来源于公开渠道，仅供参考</p>
      <p class="footer-sub">Built with ☕ &amp; deployed on GitHub Pages + Cloudflare Workers</p>
    </footer>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
