<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iCar — 智能汽车查询</title>
  <meta name="description" content="搜索任意车型，获取实时价格、配置、落地价数据" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a href="/" class="logo" aria-label="iCar Home">
          <svg class="logo-svg" viewBox="0 0 32 32" width="28" height="28">
            <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
            <rect rx="8" width="32" height="32" fill="url(#g1)"/>
            <text x="16" y="22" text-anchor="middle" font-size="18" fill="white" font-weight="bold">i</text>
          </svg>
          <span class="logo-text">iCar</span>
        </a>
        <div class="header-right">
          <span class="api-pill" id="apiStatus">
            <span class="status-dot"></span>
            <span class="status-text">API</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Hero / Search -->
    <section class="hero" id="heroSection">
      <div class="hero-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
      </div>
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="hero-title-main">搜索任意车型</span>
        </h1>
        <p class="hero-sub">实时价格 · 配置对比 · 落地价一键计算</p>
        <div class="search-box" id="searchBox">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="输入车型名称…" autocomplete="off" spellcheck="false" />
            <button class="search-clear" id="searchClear" aria-label="清空" style="display:none;">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <button class="search-btn" id="searchBtn">
              <span class="search-btn-text">搜索</span>
              <span class="search-btn-loading" style="display:none;"><span class="spinner"></span></span>
            </button>
          </div>
          <div class="suggestions" id="suggestions" style="display:none;"></div>
        </div>
        <div class="quick-tags" id="quickTags">
          <span class="quick-tag" data-q="Model Y">Model Y</span>
          <span class="quick-tag" data-q="秦PLUS">秦PLUS</span>
          <span class="quick-tag" data-q="问界M7">问界M7</span>
          <span class="quick-tag" data-q="小米SU7">小米SU7</span>
          <span class="quick-tag" data-q="理想L6">理想L6</span>
          <span class="quick-tag" data-q="蔚来ET5">蔚来ET5</span>
        </div>
      </div>
    </section>

    <!-- Main Content -->
    <main class="main" id="mainContent" style="display:none;">
      <!-- Back button -->
      <div class="top-bar" id="topBar">
        <button class="back-btn" id="backBtn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          <span id="backLabel">返回搜索</span>
        </button>
      </div>

      <!-- Search Results -->
      <section class="results-section" id="resultsSection" style="display:none;">
        <h2 class="section-title" id="resultsTitle"></h2>
        <p class="results-count" id="resultsCount"></p>
        <div class="car-grid" id="carGrid"></div>
      </section>

      <!-- Series Detail -->
      <section class="detail-section" id="detailSection" style="display:none;">
        <!-- Hero card -->
        <div class="detail-card">
          <div class="detail-visual">
            <div class="detail-img-wrap" id="detailImgWrap">
              <img id="detailCover" class="detail-img" alt="" loading="lazy" />
            </div>
            <div class="gallery-strip" id="galleryStrip" style="display:none;"></div>
          </div>
          <div class="detail-meta">
            <div class="detail-badge" id="detailBadge"></div>
            <h1 class="detail-name" id="detailTitle"></h1>
            <p class="detail-type" id="detailSubtitle"></p>
            <div class="price-cards">
              <div class="price-card">
                <span class="price-card-label">厂商指导价</span>
                <span class="price-card-value" id="detailGuidePrice">—</span>
              </div>
              <div class="price-card accent">
                <span class="price-card-label">经销商报价</span>
                <span class="price-card-value" id="detailDealerPrice">—</span>
              </div>
              <div class="price-card highlight">
                <span class="price-card-label">预估落地价</span>
                <span class="price-card-value" id="detailOnRoadPrice">—</span>
                <span class="price-card-note">仅供参考</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Price breakdown -->
        <div class="breakdown-card" id="priceBreakdown" style="display:none;">
          <h3 class="card-title">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            落地价明细
          </h3>
          <div class="breakdown-grid" id="breakdownGrid"></div>
        </div>

        <!-- Model table -->
        <div class="table-card">
          <h3 class="card-title">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
            车型列表
          </h3>
          <div class="table-loading" id="configLoading">
            <span class="spinner dark"></span> 加载中…
          </div>
          <div class="table-scroll" id="configTableWrap" style="display:none;">
            <table class="data-table" id="configTable">
              <thead id="configThead"></thead>
              <tbody id="configTbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- Overlay states -->
    <div class="overlay" id="stateOverlay" style="display:none;">
      <div class="overlay-box" id="stateContent"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>iCar — 数据来源于公开渠道，仅供参考</p>
    </footer>
  </div>

  <script src="src/js/app.js"></script>
</body>
</html>
